*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0D0D0D;color:#F0F0F0;font-family:-apple-system,sans-serif;min-height:100vh;padding-bottom:80px;}
button{cursor:pointer;font-family:inherit;}

/* HEADER */
.header{background:#0A0A0A;border-bottom:2px solid #2ECC71;padding:10px 14px;position:sticky;top:0;z-index:50;}
.header-row{display:flex;justify-content:space-between;align-items:center;}
.title{font-weight:700;font-size:15px;color:#2ECC71;}
.subtitle{font-size:9px;color:#888;margin-top:2px;}
.count{font-size:20px;font-weight:700;color:#2ECC71;text-align:right;line-height:1;}
.count-label{font-size:8px;color:#888;text-align:right;}
.progress-bar{margin-top:6px;background:#1a1a1a;border-radius:5px;height:5px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#1A6B3C,#2ECC71);transition:width .3s;}
.wpf-hint{margin-top:6px;font-size:9px;color:#E67E22;}

/* STRIP */
.strip{display:flex;gap:3px;overflow-x:auto;padding:6px 10px;background:#0A0A0A;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.strip::-webkit-scrollbar{display:none;}
.day-btn{min-width:44px;flex-shrink:0;padding:4px 2px;border-radius:7px;border:1.5px solid #2a2a2a;background:#111;text-align:center;}
.day-btn.active{background:#1a2a1a;}
.day-btn.done-btn{background:#0d1f12;}
.day-btn.today-btn{border-color:#F39C12!important;}
.day-date{font-size:8px;color:#888;}
.day-num{font-size:13px;font-weight:700;color:#888;line-height:1.1;}
.day-dot{font-size:7px;color:transparent;}
.day-dot.green{color:#2ECC71;}
.day-dot.orange{color:#F39C12;}

/* TABS */
.tabs{display:flex;background:#0A0A0A;border-bottom:1px solid #1a1a1a;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{flex:0 0 auto;padding:9px 12px;border:none;background:transparent;color:#888;font-size:10px;font-weight:600;white-space:nowrap;border-bottom:2px solid transparent;}
.tab-btn.active{background:#1a1a1a;color:#2ECC71;border-bottom:2px solid #2ECC71;}

/* DAY CARD */
.day-card{margin:6px 10px;border-radius:10px;padding:10px 12px;}
.day-meta{font-size:10px;color:#888;}
.day-title{font-size:18px;font-weight:700;margin-top:2px;}
.day-training{font-size:11px;color:#ccc;margin-top:2px;}
.day-tags{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;}
.tag{font-size:9px;padding:2px 7px;border-radius:8px;}
.done-toggle{border-radius:8px;padding:7px 10px;font-weight:700;font-size:11px;border:2px solid #555;background:transparent;color:#888;flex-shrink:0;}
.done-toggle.done{background:#2ECC71;border-color:#2ECC71;color:#000;}
.bars{margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.bar-label{display:flex;justify-content:space-between;margin-bottom:2px;}
.bar-label span{font-size:9px;color:#888;}
.bar-val{font-size:9px;font-weight:700;}
.bar-bg{background:#1a1a1a;border-radius:4px;height:5px;overflow:hidden;}
.bar-fill{height:100%;transition:width .3s;}
.bar-pct{font-size:7px;color:#666;margin-top:1px;}

/* EXERCISES */
.ex-section{padding:0 10px;}
.section-title{font-size:10px;font-weight:700;margin-bottom:5px;letter-spacing:.5px;}
.ex-table{background:#111;border-radius:9px;overflow:hidden;border:1px solid #222;}
.ex-header{display:grid;grid-template-columns:1fr 44px 50px 40px;background:#141414;padding:5px 8px;gap:4px;}
.ex-hcell{font-size:8px;color:#666;font-weight:700;text-align:center;}
.ex-hcell:first-child{text-align:left;}
.ex-row{display:grid;grid-template-columns:1fr 44px 50px 40px;padding:6px 8px;gap:4px;align-items:start;border-top:1px solid #161616;}
.ex-row:nth-child(odd){background:#0d1a0d;}
.ex-row:nth-child(even){background:#0a150a;}
.ex-name{font-size:10px;color:#ddd;}
.ex-hint{font-size:8px;color:#666;margin-top:1px;}
.ex-cell{font-size:10px;text-align:center;}
.ex-s{color:#2ECC71;font-weight:700;}
.ex-w{color:#F39C12;}
.ex-p{color:#888;font-size:9px;}

.wpf-box-title{font-size:9px;font-weight:700;color:#E67E22;margin-bottom:4px;}
.wpf-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;}
.wpf-cell{background:#0d0800;border-radius:5px;padding:5px 6px;text-align:center;}
.wpf-cell-label{font-size:8px;font-weight:700;}
.wpf-cell-time{font-size:8px;color:#888;margin-top:1px;}

.slot-inner{display:flex;align-items:center;padding:8px 10px;gap:8px;}
.slot-icon{font-size:13px;}
.slot-info{flex:1;min-width:0;}
.slot-header{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.slot-name{font-size:10px;font-weight:700;}
.slot-time{font-size:8px;color:#888;}
.slot-phase{font-size:7px;padding:1px 5px;border-radius:6px;}
.slot-plan{font-size:9px;color:#666;margin-top:2px;line-height:1.3;}
.slot-entry{font-size:10px;color:#bbb;margin-top:3px;}
.slot-vals{text-align:right;flex-shrink:0;}
.slot-kcal{font-size:11px;font-weight:700;color:#F39C12;}
.slot-prot{font-size:9px;color:#2ECC71;}

.slot-delete{padding:5px 10px;border:none;background:transparent;color:#E74C3C;font-size:9px;border-left:1px solid #1a1a1a;}

.cal-day-lbl{font-size:6px;color:#888;}

.wpf-intro-title{font-size:13px;font-weight:700;color:#3498DB;margin-bottom:6px;}
.wpf-intro-text{font-size:10px;color:#bbb;line-height:1.6;}

.wpf-item-title{font-size:11px;font-weight:700;margin-bottom:3px;}
.wpf-item-text{font-size:9.5px;color:#bbb;line-height:1.5;}
.wpf-measure{background:#0A1A0A;border:1px solid #2ECC71;border-radius:8px;padding:10px 11px;}
.wpf-measure-title{font-size:10px;font-weight:700;color:#2ECC71;margin-bottom:6px;}
.measure-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #1a2a1a;cursor:pointer;}
.measure-day{font-size:10px;color:#aaa;}
.measure-label{font-size:9px;color:#2ECC71;}

function analyseText(txt){
  const r={kcal:0,p:0,f:0,kh:0,bal:0,vitC:0,eisen:0,mag:0};

        if(found){const fac=g/100;for(const key in r)r[key]+=(found[key]||0)*fac;break;}
      }
    }
  }
  return r;
}

function getDayIndex(){
  const t=new Date();t.setHours(0,0,0,0);
  const s=new Date(START);s.setHours(0,0,0,0);
  return Math.floor((t-s)/86400000);
}

function lk(d,s){return `d${d}_${s}`;}

function totals(idx){
  let k=0,p=0;
  SLOTS.forEach(sl=>{const e=state.log[lk(idx,sl.id)];if(e){k+=e.k||0;p+=e.p||0;}});
  return{k,p};
}

function parseClaude(txt){
  const k=txt.match(/[Kk]al[orien]*[:\s]+(\d+)/);
  const p=txt.match(/[Pp]rotein[:\s]+(\d+)/);
  const d=txt.match(/[Mm]ahlzeit[:\s]+([^\n·]+)/);
  return{b:d?d[1].trim():txt.slice(0,60),k:k?parseInt(k[1]):0,p:p?parseInt(p[1]):0};
}

      // Merge, nicht ersetzen

          const saved=(state.uebSets&&state.uebSets[setKey])||[];
          const totalVol=saved.reduce((a,s)=>a+(s.kg||0)*(s.wdh||0),0);
          const totalKm=saved.reduce((a,s)=>a+(parseFloat(s.km)||0),0);
          return `<div class="ex-row" style="display:block;padding:0">
            <div style="display:grid;grid-template-columns:1fr 44px 50px 40px;padding:6px 8px;gap:4px;align-items:start">
              <div>
                <div class="ex-name">${u[0]}</div>
                <div class="ex-hint">${u[4]}</div>
                ${saved.length>0?`<div style="font-size:8px;color:${isCardio?"#F39C12":"#2ECC71"};margin-top:2px">${isCardio?totalKm.toFixed(1)+"km":"💪 "+saved.length+" Sätze · "+totalVol+"kg Vol."}</div>`:""}
              </div>
              <div class="ex-cell ex-s">${u[1]}</div>
              <div class="ex-cell ex-w">${u[2]}</div>
              <div class="ex-cell ex-p">${u[3]}</div>
            </div>
            ${saved.length>0?`<div style="background:#0a0a0a;border-top:1px solid #1a1a1a;padding:4px 8px">
              ${isCardio?
                saved.map((s,si)=>`<div style="display:grid;grid-template-columns:20px 1fr 50px 55px;gap:4px;padding:2px 0;font-size:9px"><span style="color:#888">${si+1}</span><span style="color:#ddd">${s.art||""}</span><span style="color:#F39C12;text-align:center">${s.km}km</span><span style="color:#888;text-align:right">${s.km>0?Math.round(s.min/s.km*10)/10:"—"}</span></div>`).join(""):
                saved.map((s,si)=>`<div style="display:grid;grid-template-columns:20px 60px 50px 60px;gap:4px;padding:2px 0;font-size:9px"><span style="color:#888">${si+1}</span><span style="font-weight:700;color:#F39C12;text-align:center">${s.kg}kg</span><span style="color:#2ECC71;text-align:center">${s.wdh}×</span><span style="color:#888;text-align:right">${s.kg*s.wdh}kg</span></div>`).join("")
              }
            </div>`:""}
            <div style="background:#0a0a0a;border-top:1px solid #1a1a1a;padding:5px 8px">
              ${isCardio?`
                <div style="display:grid;grid-template-columns:1fr 55px 45px 30px;gap:4px">
                  <input placeholder="Art (Laufen...)" id="ci_art_${i}" style="background:#111;border:1px solid #222;border-radius:5px;color:#fff;padding:4px 6px;font-size:9px;width:100%">
                  <input type="number" step="0.1" placeholder="km" id="ci_km_${i}" style="background:#111;border:1px solid #222;border-radius:5px;color:#fff;padding:4px 6px;font-size:9px;text-align:center">
                  <input type="number" placeholder="Min" id="ci_min_${i}" style="background:#111;border:1px solid #222;border-radius:5px;color:#fff;padding:4px 6px;font-size:9px;text-align:center">
                  <button onclick="addCardioSet(${state.sel},${i})" style="background:#F39C12;border:none;border-radius:5px;color:#000;font-weight:700;font-size:13px;cursor:pointer">+</button>
                </div>` :`
                <div style="display:grid;grid-template-columns:70px 55px 30px;gap:4px">
                  <input type="number" step="0.5" placeholder="kg" id="ki_kg_${i}" style="background:#111;border:1px solid #222;border-radius:5px;color:#fff;padding:4px 6px;font-size:9px;text-align:center">
                  <input type="number" placeholder="Wdh." id="ki_wdh_${i}" style="background:#111;border:1px solid #222;border-radius:5px;color:#fff;padding:4px 6px;font-size:9px;text-align:center">
                  <button onclick="addKraftSet(${state.sel},${i})" style="background:#2ECC71;border:none;border-radius:5px;color:#000;font-weight:700;font-size:13px;cursor:pointer">+</button>
                </div>`
              }
            </div>
          </div>`;
        }).join("")}
      </div>
    </div>`;
  }

  // PLAN TAB
  else if(state.tab==="plan"){
    html+=dayCard+`
    <div class="wpf-box">
      <div class="wpf-box-title">⚡ WPF TAG ${day.tag}</div>
      <div class="wpf-grid">
        <div class="wpf-cell"><div class="wpf-cell-label" style="color:#E74C3C">FASTEN</div><div class="wpf-cell-time">18:00–12:00</div></div>
        <div class="wpf-cell"><div class="wpf-cell-label" style="color:#F39C12">SHAKES</div><div class="wpf-cell-time">09:00+11:00</div></div>
        <div class="wpf-cell"><div class="wpf-cell-label" style="color:#2ECC71">ESSEN</div><div class="wpf-cell-time">12:00–18:00</div></div>
      </div>
    </div>`;
    SLOTS.forEach(sl=>{
      const plan=day.m[sl.id]||"";
      const entry=state.log[lk(state.sel,sl.id)];
      html+=`<div class="slot" style="background:${entry?"#0d1a10":"#111"};border:1px solid ${entry?sl.c+"44":"#222"}">
        <div class="slot-inner">
          <div class="slot-icon">${sl.icon}</div>
          <div class="slot-info">
            <div class="slot-header">
              <span class="slot-name" style="color:${sl.c}">${sl.label}</span>
              <span class="slot-time">${sl.zeit}</span>
              <span class="slot-phase" style="background:${sl.c}22;color:${sl.c}">${sl.phase}</span>
            </div>
            <div class="slot-plan">📋 ${plan}</div>
            ${entry?`<div class="slot-entry">✅ ${entry.b}</div>`:""}
          </div>
          ${entry?`<div class="slot-vals"><div class="slot-kcal">${entry.k}</div><div class="slot-prot">${entry.p}g P</div></div>`:""}
        </div>
        <div class="slot-actions">
          <button class="slot-action" onclick="openEdit('${sl.id}');setTab('log')">${entry?"✏️ Bearb.":"➕ Gegessen?"}</button>
          ${entry?`<button class="slot-delete" onclick="delEntry('${sl.id}')">✕</button>`:""}
        </div>
      </div>`;
    });
  }

  // LOG TAB
  else if(state.tab==="log"){
    html+=dayCard+`
    <div class="foto-hint">
      <div class="foto-hint-title">📸 FOTO-ANALYSE</div>
      <div class="foto-hint-text">Foto im Chat → <code>"Analysiere: Kalorien + Protein"</code> → Antwort unten einfügen</div>
    </div>`;
    SLOTS.forEach(sl=>{
      const entry=state.log[lk(state.sel,sl.id)];
      html+=`<div class="slot" style="background:${entry?"#0d1a10":"#111"};border:1px solid ${entry?sl.c+"55":"#222"}">
        <div class="slot-inner">
          <span class="slot-icon">${sl.icon}</span>
          <div class="slot-info">
            <div class="slot-header"><span class="slot-name" style="color:${sl.c}">${sl.label}</span><span class="slot-time">${sl.zeit}</span></div>
            ${entry?`<div class="slot-entry">${entry.b}</div>`:`<div style="font-size:8px;color:#444;font-style:italic;margin-top:2px">${(day.m[sl.id]||"").slice(0,40)}…</div>`}
          </div>
          ${entry?`<div class="slot-vals"><div class="slot-kcal">${entry.k} kcal</div><div class="slot-prot">${entry.p}g P</div>${entry.t?`<div class="slot-time-logged">${entry.t}</div>`:""}</div>`:""}
        </div>
        <div class="slot-actions">
          <button class="slot-action" onclick="openEdit('${sl.id}')">${entry?"✏️ Bearbeiten":"➕ Eintragen"}</button>
          ${entry?`<button class="slot-delete" onclick="delEntry('${sl.id}')">✕</button>`:""}
        </div>
      </div>`;
    });
  }

  // KALENDER TAB
  else if(state.tab==="kalender"){
    html+=`<div class="cal-section">`;
    [{monat:"Mai 2026",tage:31,start:3,pre:"05"},{monat:"Juni 2026",tage:30,start:0,pre:"06"}].forEach(({monat,tage,start,pre})=>{
      html+=`<div class="cal-card"><div class="cal-month">${monat}</div>
      <div class="cal-weekdays">${["Mo","Di","Mi","Do","Fr","Sa","So"].map(d=>`<div class="cal-wd">${d}</div>`).join("")}</div>
      <div class="cal-grid">
      ${"<div></div>".repeat(start)}`;
      for(let d=1;d<=tage;d++){
        const ds=String(d).padStart(2,"0");
        const pIdx=PLAN.findIndex(p=>p.datum===`${ds}.${pre.slice(-2)}.`);
        const hasPlan=pIdx>=0;const p=hasPlan?PLAN[pIdx]:null;
        const isToday=hasPlan&&pIdx===todayIdx;const isSel=hasPlan&&pIdx===state.sel;
        const isDone=hasPlan&&state.done[pIdx];const hasFood=hasPlan&&totals(pIdx).k>0;
        let cls="cal-day"+(hasPlan?" has-plan":"")+(isSel?" is-sel":"")+(isDone?" is-done":"")+(isToday?" is-today":"")+(hasPlan?"":" no-plan");
        let bord=isToday?"#F39C12":isSel?p?.farbe:isDone?"#2ECC71":hasPlan?"#2a2a2a":"transparent";
        html+=`<div class="${cls}" style="border-color:${bord}"${hasPlan?` onclick="selDay(${pIdx});setTab('training')"`:""}>
          <div class="cal-day-num" style="color:${isToday?"#F39C12":hasPlan?p.farbe:"#444"}">${d}</div>
          ${hasPlan?`<div class="cal-day-lbl">${p.bereich.slice(0,3)}</div>`:""}
          <div class="cal-day-mark">${isDone?"<span style='color:#2ECC71'>✓</span>":hasFood?"<span style='color:#F39C12'>●</span>":""}</div>
        </div>`;
      }
      html+=`</div></div>`;
    });
    html+=`</div>`;
  }

  // WPF TAB
  else if(state.tab==="wpf"){
    html+=`<div class="wpf-tab">
    <div class="wpf-intro">
      <div class="wpf-intro-title">⚡ WOLFS PROTEIN FASTEN</div>
      <div class="wpf-intro-text">Methode von <strong>Christian Wolf / More Nutrition</strong>. 18:6-Fasten + 2 Protein-Shakes im Fastenfenster = kein Muskelabbau, automatisches Defizit, kein Hunger.</div>
    </div>
    ${[
      {icon:"⏱",t:"18:6 Fastenfenster",c:"#E74C3C",txt:"18h fasten / 6h essen (12–18 Uhr). Automatisches Defizit ohne Tracken."},
      {icon:"🥤",t:"2 Shakes im Fasten",c:"#F39C12",txt:"09:00 + 11:00 Uhr. Whey Isolat je 25–30g, <120 kcal, kein Zucker, keine KH."},
      {icon:"🍗",t:"Protein bei jeder Mahlzeit",c:"#2ECC71",txt:"2,1g/kg = ~168g/Tag. Thermischer Effekt: +30% Kalorienverbrauch."},
      {icon:"🚫",t:"Kein Zucker",c:"#E67E22",txt:"Kein Haushaltszucker. Stevia/Erythrit und Zerup erlaubt."},
      {icon:"🥔",t:"KH timen",c:"#3498DB",txt:"KH vor Training. Abends (17:30): nur Protein + Gemüse. Kartoffeln statt Reis."},
      {icon:"💧",t:"2,5 Liter Wasser täglich",c:"#1ABC9C",txt:"Kaffee und Tee im Fasten ok. 500ml vor Mahlzeit = weniger Hunger."},
    ].map(item=>`<div class="wpf-item" style="border:1px solid ${item.c}33">
      <div class="wpf-item-title" style="color:${item.c}">${item.icon} ${item.t}</div>
      <div class="wpf-item-text">${item.txt}</div>
    </div>`).join("")}
    <div class="wpf-measure">
      <div class="wpf-measure-title">📊 MESSPUNKTE</div>
      ${[[1,"T1 · 30.05.","Ausgangsmessung"],[5,"T5 · 03.06.","1. Kontrolle"],[9,"T9 · 07.06.","Halbzeit"],[15,"T15 · 13.06.","Endspurt"],[18,"T18 · 16.06.","FINAL"]].map(([tg,d,l])=>`
        <div class="measure-row" onclick="selDay(${tg-1});setTab('training')">
          <span class="measure-day" style="color:${state.done[tg-1]?"#2ECC71":"#aaa"}">${state.done[tg-1]?"✓ ":""}${d}</span>
          <span class="measure-label">${l}</span>
        </div>`).join("")}
    </div>
    </div>`;
  }

  // EDIT MODAL
  if(state.editSlot){
    const sl=SLOTS.find(s=>s.id===state.editSlot);
    const day2=PLAN[state.sel];
    html+=`<div class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" style="color:${sl.c}">${sl.icon} ${sl.label} · TAG ${day2.tag} · ${sl.zeit}</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="plan-ref"><div class="plan-ref-label">📋 PLAN</div><div class="plan-ref-text">${day2.m[sl.id]}</div></div>
      <button class="paste-btn${state.pasteOpen?" open":""}" onclick="togglePaste()">📋 Claude-Analyse einfügen</button>
      ${state.pasteOpen?`
        <textarea class="paste-area" id="pasteArea" placeholder='Mahlzeit: 200g Hähnchen · Kalorien: 520 · Protein: 52g'>${state.form.paste}</textarea>
        <button class="paste-apply" onclick="applyPaste()">✓ Übernehmen</button>
        <div style="height:8px"></div>`:""}
      <div class="divider">— oder manuell —</div>
      <div class="field-label">Was gegessen?</div>
      <input class="field-input" id="fB" value="${state.form.b}" placeholder="z.B. 200g Hähnchen + Kartoffeln">
      <div class="field-label">Kalorien (kcal)</div>
      <input class="field-input" id="fK" type="number" value="${state.form.k}" placeholder="z.B. 520">
      <div class="field-label">Protein (g)</div>
      <input class="field-input" id="fP" type="number" value="${state.form.p||''}" placeholder="z.B. 52">
      <div class="field-label" style="color:#E67E22">Fett (g) — optional</div>
      <input class="field-input" id="fF" type="number" value="${state.form.f||''}" placeholder="z.B. 12">
      <div class="field-label" style="color:#3498DB">Kohlenhydrate (g) — optional</div>
      <input class="field-input" id="fKH" type="number" value="${state.form.kh||''}" placeholder="z.B. 45">
      <div class="field-label" style="color:#1ABC9C">Ballaststoffe (g) — optional</div>
      <input class="field-input" id="fBAL" type="number" value="${state.form.bal||''}" placeholder="z.B. 5">
      <div class="field-label" style="color:#F1C40F">Vitamin C (mg) — optional</div>
      <input class="field-input" id="fVITC" type="number" value="${state.form.vitC||''}" placeholder="z.B. 30">
      <div class="field-label" style="color:#E74C3C">Eisen (mg) — optional</div>
      <input class="field-input" id="fEIS" type="number" value="${state.form.eisen||''}" placeholder="z.B. 2">
      <div class="field-label" style="color:#9B59B6">Magnesium (mg) — optional</div>
      <input class="field-input" id="fMAG" type="number" value="${state.form.mag||''}" placeholder="z.B. 40">
      <button onclick="autoNutri()" style="width:100%;padding:8px;border:1px solid #2ECC71;border-radius:6px;background:transparent;color:#2ECC71;font-size:9px;font-weight:600;cursor:pointer;margin-bottom:8px">🔍 Nährwerte aus Beschreibung berechnen</button>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
        <button class="btn-save" onclick="saveEntry()">Speichern</button>
      </div>
    </div></div>`;
  }

  document.getElementById("app").innerHTML=html;

  // scroll strip to selected
  setTimeout(()=>{
    const strip=document.getElementById("strip");
    if(strip){const btn=strip.children[state.sel];if(btn)btn.scrollIntoView({behavior:"smooth",inline:"center",block:"nearest"});}
  },50);
}

// ── ACTIONS ────────────────────────────────────────────────────────────────
function selDay(i){state.sel=i;render();}
function setTab(t){state.tab=t;render();}

function toggleDone(){
  state.done[state.sel]=!state.done[state.sel];
  saveDone();render();
}

function openEdit(sid){
  const e=state.log[lk(state.sel,sid)]||{};
  state.editSlot=sid;state.pasteOpen=false;
  state.form={b:e.b||"",f:e.f||0,kh:e.kh||0,bal:e.bal||0,vitC:e.vitC||0,eisen:e.eisen||0,mag:e.mag||0,k:e.k||"",p:e.p||"",paste:""};
  render();
}



function addKraftSet(dayIdx, rowIdx){
  const kgEl=document.getElementById("ki_kg_"+rowIdx);
  const wdhEl=document.getElementById("ki_wdh_"+rowIdx);
  if(!kgEl||!wdhEl)return;
  const kg=parseFloat(kgEl.value)||0;
  const wdh=parseInt(wdhEl.value)||0;
  if(kg===0&&wdh===0)return;
  if(!state.uebSets)state.uebSets={};
  const key=dayIdx+"_"+rowIdx;
  if(!state.uebSets[key])state.uebSets[key]=[];
  state.uebSets[key].push({kg,wdh});
  kgEl.value="";wdhEl.value="";
  try{localStorage.setItem("wpf_uebsets_v1",JSON.stringify(state.uebSets));}catch(e){}
  render();
}

function addCardioSet(dayIdx, rowIdx){
  const artEl=document.getElementById("ci_art_"+rowIdx);
  const kmEl=document.getElementById("ci_km_"+rowIdx);
  const minEl=document.getElementById("ci_min_"+rowIdx);
  if(!kmEl)return;
  const art=(artEl&&artEl.value.trim())||"";
  const km=parseFloat(kmEl.value)||0;
  const min=parseInt(minEl.value)||0;
  if(km===0&&min===0)return;
  if(!state.uebSets)state.uebSets={};
  const key=dayIdx+"_"+rowIdx;
  if(!state.uebSets[key])state.uebSets[key]=[];
  state.uebSets[key].push({art,km,min});
  if(artEl)artEl.value="";kmEl.value="";if(minEl)minEl.value="";
  try{localStorage.setItem("wpf_uebsets_v1",JSON.stringify(state.uebSets));}catch(e){}
  render();
}

function autoNutri(){
  const bEl=document.getElementById("fB");
  if(!bEl||!bEl.value.trim()||typeof analyseText==="undefined")return;
  const res=analyseText(bEl.value);
  const map={fF:res.f,fKH:res.kh,fBAL:res.bal,fVITC:res.vitC,fEIS:res.eisen,fMAG:res.mag};
  if(res.kcal>0){const kEl=document.getElementById("fK");if(kEl&&!kEl.value)kEl.value=Math.round(res.kcal);}
  if(res.p>0){const pEl=document.getElementById("fP");if(pEl&&!pEl.value)pEl.value=Math.round(res.p);}
  for(const id in map){const el=document.getElementById(id);if(el&&!el.value&&map[id]>0)el.value=Math.round(map[id]*10)/10;}
}

function closeModal(){state.editSlot=null;render();}

function togglePaste(){
  if(state.pasteOpen){const el=document.getElementById("pasteArea");if(el)state.form.paste=el.value;}
  state.pasteOpen=!state.pasteOpen;render();
}

function applyPaste(){
  const el=document.getElementById("pasteArea");
  if(el)state.form.paste=el.value;
  const r=parseClaude(state.form.paste);
  state.form.b=r.b||state.form.b;
  state.form.k=r.k||state.form.k;
  state.form.p=r.p||state.form.p;
  state.pasteOpen=false;render();
}

function saveEntry(){
  // Lese Werte aus DOM bevor render() das Modal zerstoert
  var bEl=document.getElementById("fB");
  var kEl=document.getElementById("fK");
  var pEl=document.getElementById("fP");
  var fEl=document.getElementById("fF");
  var khEl=document.getElementById("fKH");
  var balEl=document.getElementById("fBAL");
  var vitCEl=document.getElementById("fVITC");
  var eisEl=document.getElementById("fEIS");
  var magEl=document.getElementById("fMAG");
  var bv=(bEl&&bEl.value.trim())?bEl.value.trim():state.form.b;
  var kv=parseInt((kEl&&kEl.value)?kEl.value:String(state.form.k))||0;
  var pv=parseInt((pEl&&pEl.value)?pEl.value:String(state.form.p))||0;
  var fv=parseFloat((fEl&&fEl.value)?fEl.value:0)||0;
  var khv=parseFloat((khEl&&khEl.value)?khEl.value:0)||0;
  var balv=parseFloat((balEl&&balEl.value)?balEl.value:0)||0;
  var vitCv=parseFloat((vitCEl&&vitCEl.value)?vitCEl.value:0)||0;
  var eisv=parseFloat((eisEl&&eisEl.value)?eisEl.value:0)||0;
  var magv=parseFloat((magEl&&magEl.value)?magEl.value:0)||0;
  // Auto-Analyse wenn Nährwerte leer aber Beschreibung vorhanden
  if(bv&&balv===0&&vitCv===0&&typeof analyseText==="function"){
    const au=analyseText(bv);
    if(kv===0&&au.kcal>0)kv=Math.round(au.kcal);
    if(pv===0&&au.p>0)pv=Math.round(au.p);
    if(fv===0)fv=Math.round(au.f*10)/10;
    if(khv===0)khv=Math.round(au.kh*10)/10;
    if(balv===0)balv=Math.round(au.bal*10)/10;
    if(vitCv===0)vitCv=Math.round(au.vitC*10)/10;
    if(eisv===0)eisv=Math.round(au.eisen*10)/10;
    if(magv===0)magv=Math.round(au.mag*10)/10;
  }
  if(!bv&&kv===0&&pv===0){state.editSlot=null;render();return;}
  // Merge: alle bestehenden Eintraege behalten, nur diesen Slot updaten
  var key=lk(state.sel,state.editSlot);
  var newLog={};
  Object.keys(state.log).forEach(function(k2){newLog[k2]=state.log[k2];});
  newLog[key]={b:bv,k:kv,p:pv,t:new Date().toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"}),f:fv,kh:khv,bal:balv,vitC:vitCv,eisen:eisv,mag:magv};
  state.log=newLog;
  state.editSlot=null;
  saveLog();
  render();
}

function delEntry(sid){
  delete state.log[lk(state.sel,sid)];
  saveLog();render();
}

// ── INIT ───────────────────────────────────────────────────────────────────
loadState();
</script>
