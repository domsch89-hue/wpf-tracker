*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0D0D0D;color:#F0F0F0;font-family:-apple-system,sans-serif;min-height:100vh;padding-bottom:80px;}
button{cursor:pointer;font-family:inherit;}
input,textarea,select{font-family:inherit;}
.header{background:#0A0A0A;border-bottom:2px solid #2ECC71;padding:10px 14px;position:sticky;top:0;z-index:50;}
.tabs{display:flex;background:#0A0A0A;border-bottom:1px solid #1a1a1a;overflow-x:auto;scrollbar-width:none;position:sticky;top:60px;z-index:40;}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{flex:0 0 auto;padding:9px 12px;border:none;background:transparent;color:#888;font-size:10px;font-weight:600;white-space:nowrap;border-bottom:2px solid transparent;}
.tab-btn.active{background:#1a1a1a;color:#2ECC71;border-bottom:2px solid #2ECC71;}
.card{background:#111;border-radius:10px;border:1px solid #222;margin:8px 10px;overflow:hidden;}
.section-pad{padding:0 10px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:flex;align-items:flex-end;}
.modal{background:#111;width:100%;border-radius:16px 16px 0 0;padding:16px;max-height:92vh;overflow-y:auto;}
.field-input{width:100%;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:6px;color:#fff;padding:8px 9px;font-size:11px;margin-bottom:8px;outline:none;}
.field-label{font-size:9px;color:#aaa;margin-bottom:3px;}
.progress-bar{background:#1a1a1a;border-radius:4px;height:5px;overflow:hidden;margin:3px 0;}
.progress-fill{height:100%;transition:width 0.3s;}
.nutri-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin:6px 0;}
.nutri-cell{background:#0d0d0d;border-radius:6px;padding:5px 6px;text-align:center;}
.nutri-val{font-size:10px;font-weight:700;}
.nutri-lbl{font-size:7px;color:#888;margin-top:1px;}
.nutri-pct{font-size:7px;color:#666;}
.day-btn-cal{aspect-ratio:1;border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1.5px solid #222;background:#111;cursor:pointer;}
.day-btn-cal.has-data{border-color:#1A6B3C;background:#0d1a10;}
.day-btn-cal.is-today{border-color:#F39C12!important;}
.day-btn-cal.is-sel{border-color:#2ECC71!important;background:#1a2a1a;}
.slot-row{border-radius:8px;overflow:hidden;margin-bottom:4px;}
.slot-inner{display:flex;align-items:center;padding:8px 10px;gap:8px;}
.slot-actions{display:flex;border-top:1px solid #1a1a1a;}
.slot-action{flex:1;padding:5px;border:none;background:transparent;color:#2ECC71;font-size:9px;font-weight:600;}
.slot-del{padding:5px 10px;border:none;background:transparent;color:#E74C3C;font-size:9px;border-left:1px solid #1a1a1a;}
.ueb-row{border-radius:8px;overflow:hidden;margin-bottom:4px;}
</style>
</head>

// ── NÄHRWERT ANALYSE ────────────────────────────────────────────────────────
function analyseText(text) {
  var result = {kcal:0,p:0,f:0,kh:0,bal:0,vitC:0,eisen:0,mag:0,vitD:0,kalk:0};
  var words = text.toLowerCase().split(/[\s,+·]+/);
  var i = 0;
  while(i < words.length) {
    var gram = parseFloat(words[i]);
    if(!isNaN(gram) && gram > 0) {
      // Suche nächstes bekanntes Lebensmittel
      var j = i+1;
      while(j < words.length && j < i+4) {
        var w = words[j];
        // Versuche auch Mehrwort-Kombinationen
        var found = null;
        // Direkt
        if(LM[w]) found = {lm:LM[w], g:gram};
        // Teilmatch
        if(!found) {
          for(var k in LM) {
            if(w.indexOf(k)>=0 || k.indexOf(w)>=0) { found={lm:LM[k],g:gram}; break; }
          }
        }
        if(found) {
          var factor = found.g/100;
          for(var key in result) result[key] += (found.lm[key]||0)*factor;
          break;
        }
        j++;
      }
    }
    i++;
  }
  return result;
}

function round1(v){return Math.round(v*10)/10;}

// ── STATE ───────────────────────────────────────────────────────────────────
var state = {
  log:{}, uebSets:{}, done:{},
  selDate: toDateKey(new Date()),
  tab:"log",
  editSlot:null, editForm:{b:"",k:"",p:"",f:"",kh:"",bal:"",vitC:"",eisen:"",mag:"",paste:""},
  pasteOpen:false,
  calMonth: new Date().getMonth(),
  calYear: new Date().getFullYear()
};

function toDateKey(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function pad(n){return n<10?"0"+n:String(n);}
function todayKey(){return toDateKey(new Date());}
function parseDate(k){var p=k.split("-");return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));}
function formatDate(k){var d=parseDate(k);return d.getDate()+"."+(d.getMonth()+1)+"."+d.getFullYear();}
function weekday(k){var d=parseDate(k);return["So","Mo","Di","Mi","Do","Fr","Sa"][d.getDay()];}
const MONATE=["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];

function lk(date,slot){return "l_"+date+"_"+slot;}
function uk(date,ueb){return "u_"+date+"_"+ueb.replace(/\s+/g,"_").toLowerCase();}

function getLog(date){
  var t={kcal:0,p:0,f:0,kh:0,bal:0,vitC:0,eisen:0,mag:0,vitD:0,kalk:0};
  SLOTS.forEach(function(s){var e=state.log[lk(date,s.id)];if(e){for(var k in t)t[k]+=(e[k]||0);}});
  return t;
}

function pct(v,z){return Math.min(100,Math.round(v/z*100));}

// ── STORAGE ─────────────────────────────────────────────────────────────────
function saveAll(){
  try{localStorage.setItem("wpf_log_v2",JSON.stringify(state.log));}catch(e){}
  try{localStorage.setItem("wpf_sets_v2",JSON.stringify(state.uebSets));}catch(e){}
  try{localStorage.setItem("wpf_done_v2",JSON.stringify(state.done));}catch(e){}
}

function loadAll(){
  try{var l=localStorage.getItem("wpf_log_v2");if(l)state.log=JSON.parse(l);}catch(e){}
  try{var s=localStorage.getItem("wpf_sets_v2");if(s)state.uebSets=JSON.parse(s);}catch(e){}
  try{var d=localStorage.getItem("wpf_done_v2");if(d)state.done=JSON.parse(d);}catch(e){}
  // Migrate old data
  try{var ol=localStorage.getItem("wpf_log_v1");if(ol&&!Object.keys(state.log).length){
    var old=JSON.parse(ol);var startDate=new Date("2026-05-30");
    Object.keys(old).forEach(function(k){
      var m=k.match(/^d(\d+)_(.+)$/);
      if(m){var dayIdx=parseInt(m[1]);var slotId=m[2];
        var d2=new Date(startDate);d2.setDate(d2.getDate()+dayIdx);
        var newKey=lk(toDateKey(d2),slotId);
        state.log[newKey]=old[k];
      }
    });
    saveAll();
  }}catch(e){}
}

  html+='</div>';

  html+='<div class="tabs">';

  });

    html+='<div style="font-size:10px;color:#888">'+weekday(sel)+(sel===today?" · HEUTE":"")+'</div></div>';
    html+='<button onclick="nextDay()" style="background:#1a1a1a;border:1px solid #333;border-radius:6px;color:#aaa;padding:6px 12px;font-size:14px">›</button>';
    html+='</div>';

    // Tages-Nährwerte Übersicht
    if(dayLog.kcal>0){
      html+='<div class="card" style="padding:10px 12px">';
      html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">';
      [{l:"Kalorien",v:round1(dayLog.kcal),z:TB.kcal,u:"kcal",c:"#F39C12"},{l:"Protein",v:round1(dayLog.p),z:TB.p,u:"g",c:"#2ECC71"}].forEach(function(b){
        html+='<div><div style="display:flex;justify-content:space-between;margin-bottom:2px">';
        html+='<span style="font-size:9px;color:#888">'+b.l+'</span>';
        html+='<span style="font-size:9px;font-weight:700;color:'+b.c+'">'+b.v+'/'+b.z+b.u+'</span></div>';
        html+='<div class="progress-bar"><div class="progress-fill" style="width:'+pct(b.v,b.z)+'%;background:'+(pct(b.v,b.z)>=100?"#E74C3C":b.c)+'"></div></div>';
        html+='<div style="font-size:7px;color:#666">'+pct(b.v,b.z)+'% Tagesziel</div></div>';
      });
      html+='</div>';
      // Makros
      html+='<div class="nutri-grid">';
      [{l:"Fett",v:round1(dayLog.f),z:TB.f,u:"g",c:"#E67E22"},{l:"KH",v:round1(dayLog.kh),z:TB.kh,u:"g",c:"#3498DB"},{l:"Ballaststoffe",v:round1(dayLog.bal),z:TB.bal,u:"g",c:"#1ABC9C"}].forEach(function(n){
        html+='<div class="nutri-cell"><div class="nutri-val" style="color:'+n.c+'">'+n.v+n.u+'</div><div class="nutri-lbl">'+n.l+'</div><div class="nutri-pct">'+pct(n.v,n.z)+'% TB</div></div>';

    html+='<div style="background:#0A0A14;border:1px solid #3498DB33;border-radius:8px;padding:8px 10px;margin:0 10px 4px">';

    // Slots
    SLOTS.forEach(function(sl){

  if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(function(){});
}

// ── ACTIONS ──────────────────────────────────────────────────────────────────
function setTab(t){state.tab=t;render();}
function prevDay(){var d=parseDate(state.selDate);d.setDate(d.getDate()-1);state.selDate=toDateKey(d);render();}
function nextDay(){var d=parseDate(state.selDate);d.setDate(d.getDate()+1);state.selDate=toDateKey(d);render();}
function selDate(k){state.selDate=k;render();}
function prevMonth(){state.calMonth--;if(state.calMonth<0){state.calMonth=11;state.calYear--;}render();}
function nextMonth(){state.calMonth++;if(state.calMonth>11){state.calMonth=0;state.calYear++;}render();}

function openEdit(sid){
  var e=state.log[lk(state.selDate,sid)]||{};
  state.editSlot=sid;state.pasteOpen=false;
  state.editForm={b:e.b||"",k:e.kcal||"",p:e.p||"",f:e.f||"",kh:e.kh||"",bal:e.bal||"",vitC:e.vitC||"",eisen:e.eisen||"",mag:e.mag||"",paste:""};
  render();
}
function closeModal(){state.editSlot=null;render();}
function togglePaste(){
  var el=document.getElementById("pasteArea");
  if(el)state.editForm.paste=el.value;
  state.pasteOpen=!state.pasteOpen;render();
}
function applyPaste(){
  var el=document.getElementById("pasteArea");
  if(el)state.editForm.paste=el.value;
  var txt=state.editForm.paste;
  var km=txt.match(/[Kk]al[orien]*[:\s]+(\d+)/);
  var pm=txt.match(/[Pp]rotein[:\s]+(\d+)/);
  var dm=txt.match(/[Mm]ahlzeit[:\s]+([^\n·]+)/);
  if(dm) state.editForm.b=dm[1].trim();
  if(km) state.editForm.k=parseInt(km[1]);
  if(pm) state.editForm.p=parseInt(pm[1]);
  state.pasteOpen=false;render();
}
function autoAnalyse(){
  var bEl=document.getElementById("ef_b");
  if(!bEl||!bEl.value.trim()) return;
  var res=analyseText(bEl.value);
  var fields=["k","p","f","kh","bal","vitC","eisen","mag"];
  var vals=[res.kcal,res.p,res.f,res.kh,res.bal,res.vitC,res.eisen,res.mag];
  fields.forEach(function(k,i){
    var el=document.getElementById("ef_"+k);
    if(el&&vals[i]>0) el.value=round1(vals[i]);
  });
}
function saveEntry(){
  var form={};
  ["b","k","p","f","kh","bal","vitC","eisen","mag"].forEach(function(k){
    var el=document.getElementById("ef_"+k);
    if(el) form[k]=k==="b"?el.value.trim():parseFloat(el.value)||0;
  });
  if(!form.b&&form.k===0) return;
  // Wenn keine Nährwerte eingetragen aber Beschreibung vorhanden -> auto-analyse
  if(form.bal===0&&form.vitC===0&&form.b){
    var auto=analyseText(form.b);
    if(auto.kcal>0&&form.k===0) form.k=round1(auto.kcal);
    if(auto.p>0&&form.p===0) form.p=round1(auto.p);
    if(form.f===0) form.f=round1(auto.f);
    if(form.kh===0) form.kh=round1(auto.kh);
    if(form.bal===0) form.bal=round1(auto.bal);
    if(form.vitC===0) form.vitC=round1(auto.vitC);
    if(form.eisen===0) form.eisen=round1(auto.eisen);
    if(form.mag===0) form.mag=round1(auto.mag);
  }
  var key=lk(state.selDate,state.editSlot);
  var newLog=Object.assign({},state.log);
  newLog[key]={b:form.b,kcal:form.k,p:form.p,f:form.f,kh:form.kh,bal:form.bal,vitC:form.vitC,eisen:form.eisen,mag:form.mag,
    t:new Date().toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"})};
  state.log=newLog;
  state.editSlot=null;saveAll();render();
}
function delEntry(sid){
  var n=Object.assign({},state.log);delete n[lk(state.selDate,sid)];state.log=n;saveAll();render();
}
function doAnalyse(){
  var txt=document.getElementById("analyseInput").value;
  if(!txt.trim()) return;
  var res=analyseText(txt);
  var html2='<div style="background:#0d1a0d;border-radius:8px;padding:10px;margin-top:8px">';
  html2+='<div style="font-size:10px;font-weight:700;color:#2ECC71;margin-bottom:6px">Analyse-Ergebnis:</div>';
  html2+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px">';
  [{l:"Kalorien",v:round1(res.kcal),u:"kcal",c:"#F39C12"},{l:"Protein",v:round1(res.p),u:"g",c:"#2ECC71"},{l:"Fett",v:round1(res.f),u:"g",c:"#E67E22"},
   {l:"KH",v:round1(res.kh),u:"g",c:"#3498DB"},{l:"Ballaststoffe",v:round1(res.bal),u:"g",c:"#1ABC9C"},{l:"Vit. C",v:round1(res.vitC),u:"mg",c:"#F1C40F"},
   {l:"Eisen",v:round1(res.eisen),u:"mg",c:"#E74C3C"},{l:"Magnesium",v:round1(res.mag),u:"mg",c:"#9B59B6"},{l:"Vitamin D",v:round1(res.vitD),u:"μg",c:"#E67E22"}
  ].forEach(function(n){
    html2+='<div class="nutri-cell"><div class="nutri-val" style="color:'+n.c+'">'+n.v+n.u+'</div><div class="nutri-lbl">'+n.l+'</div>';
    var tb2={kcal:TB.kcal,p:TB.p,f:TB.f,kh:TB.kh,bal:TB.bal,vitC:TB.vitC,eisen:TB.eisen,mag:TB.mag,vitD:TB.vitD};
    var zbk={kcal:"kcal",p:"p",f:"f",kh:"kh",bal:"bal",vitC:"vitC",eisen:"eisen",mag:"mag",vitD:"vitD"};
    html2+='</div>';
  });
  html2+='</div>';
  // Eintrag-Code
  html2+='<div style="margin-top:8px;font-size:9px;color:#888">Eintrag-Code zum Kopieren:</div>';
  html2+='<div style="background:#0d0d0d;border-radius:5px;padding:7px;margin-top:4px;font-size:9px;color:#F39C12;font-family:monospace;word-break:break-all">';
  html2+='Mahlzeit: '+txt+' · Kalorien: '+round1(res.kcal)+' · Protein: '+round1(res.p)+'g</div>';
  html2+='</div>';
  document.getElementById("analyseResult").innerHTML=html2;
}
function addTraining(){
  var ueb=document.getElementById("tUeb");
  var typ=document.getElementById("tTyp");
  var kg=document.getElementById("tKg");
  var wdh=document.getElementById("tWdh");
  var km2=document.getElementById("tKm");
  if(!ueb||!ueb.value.trim()) return;
  var key=uk(state.selDate,ueb.value.trim());
  if(!state.uebSets[key]) state.uebSets[key]=[];
  if(typ&&typ.value==="cardio"){
    state.uebSets[key].push({km:parseFloat(km2&&km2.value)||0,min:parseInt(wdh&&wdh.value)||0});
  } else {
    state.uebSets[key].push({kg:parseFloat(kg&&kg.value)||0,wdh:parseInt(wdh&&wdh.value)||0});
  }
  saveAll();render();
}
function delUeb(k){delete state.uebSets[k];saveAll();render();}

// ── INIT ─────────────────────────────────────────────────────────────────────
loadAll();
render();
</script>
